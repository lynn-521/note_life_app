name: family_butler
description: 综合家庭管家（Family Butler）—— 本地优先的家庭管理 Flutter 应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 模型（不可变 + JSON 序列化）
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 本地 DB（Drift / SQLite，类型安全 + 代码生成）
  drift: ^2.16.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # 路由
  go_router: ^14.1.0

  # 本地通知 + 后台
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.3
  workmanager: ^0.5.2

  # 工具
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.16.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
